---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Weekly: catches CVEs published against unchanged code.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v9

  test:
    name: Test
    strategy:
      matrix:
        # No Windows: per-shell isolation relies on Unix process semantics.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - name: Test
        run: go test -race ./...
      - name: Build
        run: go build .

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
