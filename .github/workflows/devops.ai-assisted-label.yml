name: AI-assisted label

# pull_request_target so fork PRs can be labeled; never check out PR code here
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-ai-assisted:
    runs-on: ubuntu-latest
    steps:
      - name: Check for AI co-authorship and label PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const labelName = 'ai-assisted';

            // Co-Authored-By trailers written by AI tools:
            // Claude, ChatGPT/Codex, GitHub Copilot, Cursor, Aider, Devin, Jules
            const aiCoAuthorPattern = /Co-Authored-By:.*(@anthropic\.com|@openai\.com|\bcopilot\b|@cursor\.(com|sh)|@aider\.chat|devin-ai|@devin\.ai|google-labs-jules)/i;

            // Check PR body
            const prBody = context.payload.pull_request.body || '';
            if (aiCoAuthorPattern.test(prBody)) {
              core.info('AI co-author detected in PR body');
              await addLabel();
              return;
            }

            // Check commit messages
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: prNumber, per_page: 100 }
            );

            const found = commits.some(c => aiCoAuthorPattern.test(c.commit.message));
            if (found) {
              core.info('AI co-author detected in commit message(s)');
              await addLabel();
              return;
            }

            core.info('No AI co-author detected');

            async function addLabel() {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: labelName });
              } catch (e) {
                if (e.status === 404) {
                  core.info(`Creating label "${labelName}"`);
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: labelName,
                    color: '9C27B0',
                    description: 'PR contains AI-assisted code'
                  });
                } else {
                  throw e;
                }
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: [labelName]
              });
              core.info(`Label "${labelName}" added to PR #${prNumber}`);
            }
