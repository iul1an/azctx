version: 2

project_name: azctx

# Fork of riweston/aztx (MIT). Releases GitHub binaries only — no brew/
# scoop/winget publishing, and no Windows builds: the per-shell isolation
# uses Unix process semantics (signals, $SHELL).
builds:
  - goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^test"
