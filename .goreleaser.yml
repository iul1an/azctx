version: 2

project_name: azctx

# Fork of riweston/aztx (MIT). Releases GitHub binaries only — no brew/
# scoop/winget publishing, and no Windows builds: the per-shell isolation
# uses Unix process semantics (signals, $SHELL).
builds:
  - goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^test"

homebrew_casks:
  - name: azctx
    repository:
      owner: iul1an
      name: homebrew-azctx
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/iul1an/azctx"
    description: "Per-shell isolated Azure subscription contexts"
    binaries:
      - azctx
    dependencies:
      - formula: azure-cli
    # The release binaries are unsigned; clear the quarantine bit so
    # Gatekeeper does not block them.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/azctx"]
          end
